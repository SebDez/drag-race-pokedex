<div class="min-h-full px-4 pb-8 max-w-[42rem] mx-auto sm:px-5 sm:pb-10">
  <header class="text-center mb-6">
    <h1
      class="text-[clamp(1.75rem,5vw,2.25rem)] font-bold text-[var(--color-gold)] m-0 tracking-tight drop-shadow-[0_1px_2px_rgba(0,0,0,0.06)]"
    >
      {{ 'home.title' | translate }}
    </h1>
    <p class="mt-1 text-[15px] text-[var(--color-text-muted)]">{{ 'home.subtitle' | translate }}</p>
  </header>

  @if (store.error()) {
    <div
      class="flex items-center justify-center gap-3 py-8 text-[15px] text-[var(--color-error)]"
      role="alert"
    >
      <p>{{ store.error() | translate }}</p>
    </div>
  } @else {
    <p class="text-sm text-[var(--color-text-muted)] mb-4">
      {{ 'home.contestantsCount' | translate: { count: store.viewModel().list?.length || 0 } }}
    </p>
    <!-- Filters -->
    <app-contestant-list-filters
      [groupMode]="store.groupMode()"
      (groupModeChange)="onGroupModeChange($event)"
      [sortMode]="store.sortMode()"
      (sortModeChange)="onSortModeChange($event)"
      [filters]="store.filters()"
      (filtersChange)="onFiltersChange($event)"
    />
    <!-- List -->
    @if (store.loading()) {
      <div
        class="flex items-center justify-center gap-3 py-8 text-[15px] text-[var(--color-text-muted)]"
        role="status"
        [attr.aria-label]="'aria.loading' | translate"
      >
        <span
          class="w-5 h-5 border-2 border-[var(--color-pink-light)] border-t-[var(--color-pink)] rounded-full animate-spin"
        ></span>
        <span>{{ 'home.loading' | translate }}</span>
      </div>
    } @else {
      <app-contestant-list [viewModel]="store.viewModel()" />
    }
  }
</div>
