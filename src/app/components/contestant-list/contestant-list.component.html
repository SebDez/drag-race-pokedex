<div class="flex flex-col gap-2 list-none m-0 p-0">
  @for (contestant of contestants(); track trackByDragName($index, contestant)) {
    <div class="flex flex-col gap-0">
      <app-contestant-card
        [contestant]="contestant"
        [isExpanded]="isExpanded(contestant.dragName)"
        (cardClick)="toggleExpand($event)"
      />
      @if (isDetailVisible(contestant.dragName)) {
        <app-contestant-detail
          [contestant]="contestant"
          [isClosing]="isDetailClosing(contestant.dragName)"
        />
      }
    </div>
  }
</div>
